name: Bug Report
description: Report something broken or unclear.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug or broken behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Include steps, browser/device info, screenshots or logs if useful.
    validations:
      required: false
