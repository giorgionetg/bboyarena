name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_APP_VERSION: ${{ github.sha }}
      PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}
      PUBLIC_DISCORD_URL: ${{ vars.PUBLIC_DISCORD_URL }}
      PUBLIC_INSTAGRAM_URL: ${{ vars.PUBLIC_INSTAGRAM_URL }}
      PUBLIC_CONTACT_EMAIL: ${{ vars.PUBLIC_CONTACT_EMAIL }}
      PUBLIC_ANALYTICS_SCRIPT_URL: ${{ vars.PUBLIC_ANALYTICS_SCRIPT_URL }}
      PUBLIC_ANALYTICS_WEBSITE_ID: ${{ vars.PUBLIC_ANALYTICS_WEBSITE_ID }}
      PUBLIC_GITHUB_URL: ${{ vars.PUBLIC_GITHUB_URL }}
      PUBLIC_NEWSLETTER_URL: ${{ vars.PUBLIC_NEWSLETTER_URL }}
      PUBLIC_SEO_SITE_NAME: ${{ vars.PUBLIC_SEO_SITE_NAME }}
      PUBLIC_SEO_TITLE: ${{ vars.PUBLIC_SEO_TITLE }}
      PUBLIC_SEO_DESCRIPTION: ${{ vars.PUBLIC_SEO_DESCRIPTION }}
      PUBLIC_SEO_OG_IMAGE: ${{ vars.PUBLIC_SEO_OG_IMAGE }}
      PUBLIC_SEO_OG_IMAGE_ALT: ${{ vars.PUBLIC_SEO_OG_IMAGE_ALT }}
      PUBLIC_SEO_LOGO: ${{ vars.PUBLIC_SEO_LOGO }}
      PUBLIC_SEO_LOCALE: ${{ vars.PUBLIC_SEO_LOCALE }}
      PUBLIC_SEO_TWITTER_SITE: ${{ vars.PUBLIC_SEO_TWITTER_SITE }}
      PUBLIC_SEO_TWITTER_CREATOR: ${{ vars.PUBLIC_SEO_TWITTER_CREATOR }}
      PUBLIC_SEO_AUTHOR: ${{ vars.PUBLIC_SEO_AUTHOR }}
      PUBLIC_NEWS_EXTERNAL_FEED_URL: ${{ vars.PUBLIC_NEWS_EXTERNAL_FEED_URL }}
      PUBLIC_NEWS_EXTERNAL_SOURCE_NAME: ${{ vars.PUBLIC_NEWS_EXTERNAL_SOURCE_NAME }}
      PUBLIC_NEWS_EXTERNAL_SOURCE_URL: ${{ vars.PUBLIC_NEWS_EXTERNAL_SOURCE_URL }}
      PUBLIC_GAME_URL: ${{ vars.PUBLIC_GAME_URL }}
      PUBLIC_GAME_EMBED_URL: ${{ vars.PUBLIC_GAME_EMBED_URL }}
      PUBLIC_GAME_BASE: ${{ vars.PUBLIC_GAME_BASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Compute public site URL
        shell: bash
        run: |
          if [ -n "${PUBLIC_SITE_URL:-}" ]; then
            echo "Using configured PUBLIC_SITE_URL=$PUBLIC_SITE_URL"
          else
            echo "PUBLIC_SITE_URL=https://bboyarena.org/" >> "$GITHUB_ENV"
          fi

      - name: Compute public game URL
        shell: bash
        run: |
          resolved_game_url="${PUBLIC_GAME_URL:-https://bboyarena.org/game}"
          resolved_game_embed_url="${PUBLIC_GAME_EMBED_URL:-$resolved_game_url}"

          if [ -n "${PUBLIC_GAME_URL:-}" ]; then
            echo "Using configured PUBLIC_GAME_URL=$PUBLIC_GAME_URL"
          else
            echo "PUBLIC_GAME_URL=$resolved_game_url" >> "$GITHUB_ENV"
          fi

          if [ -n "${PUBLIC_GAME_EMBED_URL:-}" ]; then
            echo "Using configured PUBLIC_GAME_EMBED_URL=$PUBLIC_GAME_EMBED_URL"
          else
            echo "PUBLIC_GAME_EMBED_URL=$resolved_game_embed_url" >> "$GITHUB_ENV"
          fi

          if [ -n "${PUBLIC_GAME_BASE:-}" ]; then
            echo "Using configured PUBLIC_GAME_BASE=$PUBLIC_GAME_BASE"
          else
            echo "PUBLIC_GAME_BASE=/game/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Build game
        run: npm run game:build

      - name: Add game build to website dist
        shell: bash
        run: |
          mkdir -p dist/game
          cp -R dist-game/. dist/game/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
