name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Compute public site URL
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY##*/}"
          owner_name="${GITHUB_REPOSITORY_OWNER}"
          if [ "$repo_name" = "$owner_name.github.io" ]; then
            echo "PUBLIC_SITE_URL=https://${owner_name}.github.io/" >> "$GITHUB_ENV"
          else
            echo "PUBLIC_SITE_URL=https://${owner_name}.github.io/${repo_name}/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
